<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple RPG</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game">
        <h1>⚔️ Welcome to Simple RPG! ⚔️</h1>
        <!-- Character Creation -->
        <section id="startScreen">
            <h2>Create Your Hero</h2>
            <div id="creationArea">
                <div id="classInfo">
                    <h2 id="selectedTitle">Choose a Class</h2>
                    <div id="portrait">
                    </div>
                    <div id="classDescription">Each character will have different health and attack power</div>
                    <p id="classStats"></p>
                    <button id="confirmClassButton">Confirm Class</button>
                    <button id="beginAdventureButton">Begin Adventure</button>
                </div>
                
                <div id="creationControls">
                    <label>Character Name:</label>
                    <input id="nameInput" type="text" placeholder="Enter hero name">
                    <h3>Select Class</h3>
                    <button class="classButton" data-class="Knight"> Knight</button>
                    <button class="classButton" data-class="Magician">Magician</button>
                    <button class="classButton" data-class="Archer">Archer</button>
                </div>
            </div>
        </section>

        <!-- Main Game Screen -->
        <section id="battleScreen" style="display: none;">
            <div id="characters">
    </div>

    <div id="log">
    </div>
    <div id="actions">
        <button id="attackButton">⚔️ Attack</button>
        <button id="defendButton">🛡️ Defend</button>
        <button id="healButton">🧪 Use Health Potion</button>
        <div id="choiceButtons" style="display: none;">
            <button id="nextFoeButton">⚔️ Fight Next Foe</button>
            <button id="fleeButton">🏃 Flee</button>
        </div>
        <button id="playAgainButton" style="display: none;">Play Again</button>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    </section>
    </div>
    <script src="rpg.js"></script>
    <script src="game.js"></script>

</body>
</html>
